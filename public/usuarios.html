<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios — Las Gambusinas</title>
  <!-- Animate.css - Animaciones CSS puras -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <!-- AOS - Animate On Scroll -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bg: { primary: '#0a0a0f', card: '#1a1a28', sidebar: '#12121a' },
        gold: { DEFAULT: '#d4af37', '20': 'rgba(212,175,55,0.125)', '40': 'rgba(212,175,55,0.25)' },
        st: { libre: '#00d4aa', esperando: '#ffa502', pedido: '#3498db', preparado: '#2ecc71', pagado: '#ff4757', reservado: '#5352ed' },
        txt: { primary: '#ffffff', secondary: '#a0a0b8', muted: '#5a5a7a' }
      },
      fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
    }
  }
}
</script>
<link rel="stylesheet" href="/assets/css/dashboard.css">
<link rel="stylesheet" href="/assets/css/animations.css">
<link rel="stylesheet" href="/assets/css/page-transitions.css">
<!-- Cosmos Search Bar - Glassmorphism Style -->
<link rel="stylesheet" href="/assets/css/cosmos-search.css">
</head>
<body class="bg-bg-primary text-white font-sans antialiased min-h-screen" x-data="usuariosApp()" x-cloak>

<div id="topbar-container"></div>
<div class="flex pt-[72px] min-h-screen">
  <div id="sidebar-container"></div>
  <main :class="sidebarOpen ? 'ml-[270px]' : 'ml-[68px]'" class="flex-1 transition-all duration-300 min-h-[calc(100vh-72px)] p-6">
    
    <!-- HEADER -->
    <div class="flex items-center justify-between mb-5">
      <h1 class="text-xl font-bold">Gestión de Usuarios</h1>
      <button class="bg-gold text-bg-primary px-4 py-2 rounded-lg text-sm font-semibold" @click="openCreateModal()">+ Nuevo Usuario</button>
    </div>

    <!-- KPIs -->
    <div class="grid grid-cols-5 gap-4 mb-6">
      <div class="bg-bg-card border border-[rgba(212,175,55,0.25)] rounded-xl p-4">
        <p class="text-[11px] text-txt-muted uppercase">Total Usuarios</p>
        <p class="text-2xl font-bold text-white mt-1" x-text="usuarios.length"></p>
      </div>
      <div class="bg-bg-card border border-[rgba(212,175,55,0.25)] rounded-xl p-4">
        <p class="text-[11px] text-txt-muted uppercase">Activos</p>
        <p class="text-2xl font-bold text-st-preparado mt-1" x-text="usuarios.filter(m=>m.activo!==false).length"></p>
      </div>
      <template x-for="(rol, index) in roles.slice(0, 3)" :key="rol._id">
        <div class="bg-bg-card border border-[rgba(212,175,55,0.25)] rounded-xl p-4">
          <p class="text-[11px] text-txt-muted uppercase" x-text="rol.nombreDisplay || rol.nombre"></p>
          <p class="text-2xl font-bold mt-1"
            :class="{
              'text-gold': rol.color === 'gold',
              'text-st-preparado': rol.color === 'st-preparado',
              'text-st-pedido': rol.color === 'st-pedido',
              'text-st-libre': rol.color === 'st-libre' || !rol.color,
              'text-st-esperando': rol.color === 'st-esperando',
              'text-st-pagado': rol.color === 'st-pagado',
              'text-st-reservado': rol.color === 'st-reservado'
            }"
            x-text="usuarios.filter(m => m.roles?.includes(rol.nombre) || m.rol === rol.nombre).length"></p>
        </div>
      </template>
    </div>

    <!-- FILTROS -->
    <div class="bg-bg-card border border-[rgba(212,175,55,0.15)] rounded-xl p-4 mb-6">
      <div class="flex flex-wrap items-center gap-4">
        <div class="flex-1 min-w-[200px]">
          <input type="text" x-model="busqueda" placeholder="Buscar por nombre o DNI..." 
            class="w-full bg-bg-sidebar border border-[rgba(212,175,55,0.25)] rounded-lg px-4 py-2 text-sm focus:border-gold focus:outline-none">
        </div>
        <div class="flex gap-2">
          <select x-model="filtroRol" class="bg-bg-sidebar border border-[rgba(212,175,55,0.25)] rounded-lg px-4 py-2 text-sm text-txt-secondary focus:border-gold focus:outline-none">
            <option value="">Todos los roles</option>
            <template x-for="rol in roles" :key="rol._id">
              <option :value="rol.nombre" x-text="rol.nombreDisplay || rol.nombre"></option>
            </template>
          </select>
          <select x-model="filtroEstado" class="bg-bg-sidebar border border-[rgba(212,175,55,0.25)] rounded-lg px-4 py-2 text-sm text-txt-secondary focus:border-gold focus:outline-none">
            <option value="">Todos los estados</option>
            <option value="activo">Activos</option>
            <option value="inactivo">Inactivos</option>
          </select>
        </div>
      </div>
    </div>

    <!-- LOADING STATE -->
    <div x-show="loading && usuarios.length === 0" class="flex items-center justify-center h-32">
      <div class="w-6 h-6 border-2 border-gold border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- TABLA -->
    <div x-show="!loading || usuarios.length > 0" class="bg-bg-card border border-[rgba(212,175,55,0.15)] rounded-xl overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr class="bg-bg-sidebar text-txt-secondary text-[11px] uppercase">
          <th class="text-left px-4 py-3 font-semibold">Usuario</th>
          <th class="text-left px-4 py-3 font-semibold">DNI</th>
          <th class="text-left px-4 py-3 font-semibold">Teléfono</th>
          <th class="text-left px-4 py-3 font-semibold">Rol</th>
          <th class="text-left px-4 py-3 font-semibold">Estado</th>
          <th class="text-left px-4 py-3 font-semibold">Acciones</th>
        </tr></thead>
        <tbody>
          <tr x-show="usuariosFiltrados.length === 0">
            <td colspan="6" class="px-4 py-8 text-center text-txt-muted">No se encontraron usuarios</td>
          </tr>
          <template x-for="m in usuariosFiltrados" :key="m._id || m.id">
            <tr class="border-b border-[rgba(212,175,55,0.08)] table-row hover:bg-bg-sidebar/50">
              <td class="px-4 py-3">
                <div class="flex items-center gap-3">
                  <div class="w-8 h-8 rounded-full bg-gold/20 flex items-center justify-center text-gold text-xs font-bold" x-text="m.nombre?.charAt(0)?.toUpperCase() || '?'"></div>
                  <span class="font-medium" x-text="m.nombre"></span>
                </div>
              </td>
              <td class="px-4 py-3 text-txt-secondary" x-text="m.dni || '—'"></td>
              <td class="px-4 py-3 text-txt-secondary" x-text="m.telefono || '—'"></td>
              <td class="px-4 py-3">
                <div class="flex flex-wrap gap-1">
                  <template x-for="rolItem in (Array.isArray(m.roles) ? m.roles : (m.rol ? [m.rol] : []))" :key="rolItem">
                    <span class="text-xs px-2 py-0.5 rounded-full font-semibold"
                      :class="{
                        'bg-gold/20 text-gold': getRolColor(rolItem) === 'gold',
                        'bg-st-preparado/20 text-st-preparado': getRolColor(rolItem) === 'st-preparado',
                        'bg-st-pedido/20 text-st-pedido': getRolColor(rolItem) === 'st-pedido',
                        'bg-st-libre/20 text-st-libre': getRolColor(rolItem) === 'st-libre' || !getRolColor(rolItem),
                        'bg-st-esperando/20 text-st-esperando': getRolColor(rolItem) === 'st-esperando',
                        'bg-st-pagado/20 text-st-pagado': getRolColor(rolItem) === 'st-pagado',
                        'bg-st-reservado/20 text-st-reservado': getRolColor(rolItem) === 'st-reservado'
                      }" x-text="getRolNombre(rolItem)"></span>
                  </template>
                </div>
              </td>
              <td class="px-4 py-3">
                <span class="text-xs px-2 py-0.5 rounded-full font-semibold cursor-pointer" 
                  :class="m.activo !== false ? 'bg-st-preparado/20 text-st-preparado' : 'bg-txt-muted/20 text-txt-muted'"
                  @click="toggleActivo(m)" x-text="m.activo !== false ? 'Activo' : 'Inactivo'"></span>
              </td>
              <td class="px-4 py-3 space-x-2 text-base">
                <span class="cursor-pointer hover:text-gold" @click="openEditModal(m)" title="Editar usuario">✏️</span>
                <span class="cursor-pointer hover:text-st-pagado" @click="eliminarUsuario(m._id)" title="Eliminar usuario">🗑️</span>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

  </main>
</div>

<!-- MODAL: CREAR/EDITAR USUARIO -->
<div x-show="modal" x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay bg-black/70" @click.self="modal=null">
  <div class="bg-bg-card border border-[rgba(212,175,55,0.25)] rounded-2xl w-[600px] max-h-[90vh] overflow-y-auto shadow-2xl" @click.stop>
    <div class="bg-bg-sidebar p-5 rounded-t-2xl flex items-center justify-between">
      <div><h2 class="text-lg font-bold" x-text="isEditing ? 'Editar Usuario' : 'Crear Nuevo Usuario'"></h2><p class="text-xs text-txt-muted" x-text="isEditing ? 'Modifique los datos del usuario' : 'Registre un nuevo usuario en el sistema'"></p></div>
      <button @click="modal=null" class="w-7 h-7 flex items-center justify-center rounded-full bg-gold-20 text-gold text-sm">✕</button>
    </div>
    <div class="p-6 space-y-4">
      <div>
        <label class="text-xs text-txt-secondary mb-1 block">Nombre completo <span class="text-st-pagado">*</span></label>
        <input type="text" x-model="formUsuario.nombre" placeholder="Ej: Juan Pérez" class="w-full bg-bg-sidebar border border-[rgba(212,175,55,0.25)] rounded-lg px-4 py-2.5 text-sm focus:border-gold focus:outline-none">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="text-xs text-txt-secondary mb-1 block">DNI <span class="text-st-pagado">*</span></label><input type="text" x-model="formUsuario.dni" placeholder="12345678" class="w-full bg-bg-sidebar border border-[rgba(212,175,55,0.25)] rounded-lg px-4 py-2.5 text-sm focus:border-gold focus:outline-none"></div>
        <div><label class="text-xs text-txt-secondary mb-1 block">Teléfono</label><input type="text" x-model="formUsuario.telefono" placeholder="987 654 321" class="w-full bg-bg-sidebar border border-[rgba(212,175,55,0.25)] rounded-lg px-4 py-2.5 text-sm focus:border-gold focus:outline-none"></div>
      </div>
      <div>
        <label class="text-xs text-txt-secondary mb-2 block">Roles del Usuario <span class="text-txt-muted">(seleccione uno o más)</span></label>
        <div class="grid grid-cols-3 gap-2">
          <template x-for="rolItem in roles" :key="rolItem._id">
            <button type="button" @click="toggleRol(rolItem.nombre)"
              :class="formUsuario.roles?.includes(rolItem.nombre) ? 'bg-gold text-bg-primary border-gold' : 'bg-bg-sidebar border-[rgba(212,175,55,0.25)] text-txt-secondary hover:border-gold'"
              class="px-3 py-2 rounded-lg text-xs font-semibold border transition flex items-center justify-center gap-1.5">
              <span x-show="formUsuario.roles?.includes(rolItem.nombre)" class="text-[10px]">✓</span>
              <span x-text="rolItem.nombreDisplay || rolItem.nombre"></span>
            </button>
          </template>
        </div>
        <p x-show="roles.length === 0" class="text-xs text-txt-muted mt-2">Cargando roles...</p>
        
        <!-- Permisos combinados de los roles seleccionados -->
        <div x-show="formUsuario.roles?.length > 0" class="mt-4 p-3 bg-bg-sidebar rounded-lg border border-[rgba(212,175,55,0.15)]">
          <div class="flex items-center justify-between cursor-pointer" @click="mostrarPermisos = !mostrarPermisos">
            <div class="flex items-center gap-2">
              <span class="text-xs text-txt-secondary">Permisos combinados</span>
              <span class="text-[10px] px-1.5 py-0.5 rounded bg-gold/20 text-gold" x-text="getPermisosRolesSeleccionados().length + ' permisos'"></span>
              <span x-show="formUsuario.roles?.length > 1" class="text-[10px] px-1.5 py-0.5 rounded bg-st-libre/20 text-st-libre" x-text="formUsuario.roles?.length + ' roles'"></span>
            </div>
            <span class="text-xs text-txt-muted transition-transform" :class="mostrarPermisos ? 'rotate-180' : ''">▼</span>
          </div>
          
          <!-- Roles seleccionados con sus permisos individuales -->
          <div x-show="formUsuario.roles?.length > 1" class="mt-2 flex flex-wrap gap-1">
            <template x-for="rolSel in formUsuario.roles" :key="rolSel">
              <span class="text-[10px] px-2 py-0.5 rounded-full bg-gold/30 text-gold border border-gold/40"
                x-text="getRolNombre(rolSel) + ' (' + getPermisosRol(rolSel).length + ')'"></span>
            </template>
          </div>
          
          <div x-show="mostrarPermisos" x-transition class="mt-3 space-y-2">
            <template x-for="grupo in getPermisosAgrupadosRoles(formUsuario.roles)" :key="grupo.nombre">
              <div class="border-b border-[rgba(212,175,55,0.08)] pb-2 last:border-0">
                <div class="flex items-center gap-2 mb-1.5">
                  <span x-text="grupo.icono" class="text-sm"></span>
                  <p class="text-[10px] text-gold uppercase tracking-wide" x-text="grupo.nombre"></p>
                </div>
                <div class="flex flex-wrap gap-1.5">
                  <template x-for="permiso in grupo.permisos" :key="permiso.id">
                    <span class="text-[10px] px-2 py-0.5 rounded-full"
                      :class="permiso.activo ? 'bg-st-preparado/20 text-st-preparado' : 'bg-txt-muted/10 text-txt-muted'"
                      x-text="permiso.nombre"
                      :title="permiso.rolesOrigen ? 'Desde: ' + permiso.rolesOrigen.join(', ') : ''"></span>
                  </template>
                </div>
              </div>
            </template>
          </div>
          
          <!-- Permisos personalizados del usuario -->
          <div x-show="isEditing && formUsuario.permisosPersonalizados?.length > 0" class="mt-3 pt-3 border-t border-[rgba(212,175,55,0.15)]">
            <p class="text-[10px] text-st-libre uppercase tracking-wide mb-1.5">Permisos personalizados</p>
            <div class="flex flex-wrap gap-1.5">
              <template x-for="permiso in formUsuario.permisosPersonalizados" :key="permiso.permiso">
                <span class="text-[10px] px-2 py-0.5 rounded-full"
                  :class="permiso.permitido ? 'bg-st-libre/20 text-st-libre' : 'bg-st-pagado/20 text-st-pagado'"
                  x-text="permiso.permiso"></span>
              </template>
            </div>
          </div>
        </div>
      </div>
      <label class="flex items-center gap-2 text-sm cursor-pointer">
        <input type="checkbox" x-model="formUsuario.activo" class="w-4 h-4 rounded border-[rgba(212,175,55,0.25)] bg-bg-sidebar text-gold focus:ring-gold">
        <span class="text-txt-secondary">Usuario activo</span>
      </label>
    </div>
    <div class="bg-bg-sidebar p-5 rounded-b-2xl flex justify-end gap-2 border-t border-[rgba(212,175,55,0.15)]">
      <button @click="modal=null" class="px-5 py-2.5 border border-txt-muted/30 rounded-lg text-sm text-txt-secondary hover:border-gold hover:text-gold transition">Cancelar</button>
      <button @click="guardarUsuario()" class="px-5 py-2.5 bg-gold text-bg-primary rounded-lg text-sm font-semibold hover:brightness-110 transition" x-text="isEditing ? 'Actualizar' : 'Crear Usuario'"></button>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container" class="fixed bottom-6 right-6 z-[9999] space-y-2"></div>

<script src="/assets/js/notifications.js"></script>
<script src="/assets/js/shared.js"></script>
<script>
function usuariosApp() {
  return {
    sidebarOpen: true,
    modal: null,
    isEditing: false,
    loading: true,
    usuarios: [],
    roles: [],
    busqueda: '',
    filtroRol: '',
    filtroEstado: '',
    formUsuario: {
      _id: null,
      nombre: '',
      dni: '',
      telefono: '',
      roles: ['mozos'],
      activo: true,
      permisosPersonalizados: []
    },
    mostrarPermisos: false,
    
    // Definición de permisos por rol
    PERMISOS_POR_ROL: {
      admin: {
        'Backend/Dashboard': ['ver-mesas', 'editar-mesas', 'juntar-separar-mesas', 'ver-platos', 'editar-platos', 'ver-areas', 'editar-areas', 'ver-clientes', 'editar-clientes', 'ver-mozos', 'editar-mozos', 'gestionar-roles', 'ver-auditoria', 'ver-reportes', 'cierre-caja', 'ver-notificaciones'],
        'App Mozos': ['crear-comandas', 'editar-comandas', 'eliminar-platos-comandas', 'procesar-pagos', 'asociar-clientes'],
        'App Cocina': ['ver-comandas-cocina', 'cambiar-estados-platos', 'revertir-comandas']
      },
      supervisor: {
        'Backend/Dashboard': ['ver-mesas', 'editar-mesas', 'juntar-separar-mesas', 'ver-platos', 'editar-platos', 'ver-areas', 'editar-areas', 'ver-clientes', 'editar-clientes', 'ver-mozos', 'ver-auditoria', 'ver-reportes', 'cierre-caja', 'ver-notificaciones'],
        'App Mozos': ['crear-comandas', 'editar-comandas', 'procesar-pagos', 'asociar-clientes'],
        'App Cocina': ['ver-comandas-cocina']
      },
      cocinero: {
        'Backend/Dashboard': ['ver-platos'],
        'App Cocina': ['ver-comandas-cocina', 'cambiar-estados-platos', 'revertir-comandas']
      },
      mozos: {
        'Backend/Dashboard': ['ver-platos', 'ver-clientes'],
        'App Mozos': ['crear-comandas', 'editar-comandas', 'asociar-clientes']
      },
      capitanMozos: {
        'Backend/Dashboard': ['ver-platos', 'ver-clientes'],
        'App Mozos': ['crear-comandas', 'editar-comandas', 'eliminar-platos-comandas', 'procesar-pagos', 'asociar-clientes']
      },
      cajero: {
        'Backend/Dashboard': ['ver-platos', 'ver-clientes', 'cierre-caja'],
        'App Mozos': ['procesar-pagos', 'asociar-clientes']
      }
    },
    
    PERMISOS_NOMBRES: {
      'ver-mesas': 'Ver Mesas',
      'editar-mesas': 'Editar Mesas',
      'juntar-separar-mesas': 'Juntar/Separar Mesas',
      'ver-platos': 'Ver Platos',
      'editar-platos': 'Editar Platos',
      'ver-areas': 'Ver Áreas',
      'editar-areas': 'Editar Áreas',
      'ver-clientes': 'Ver Clientes',
      'editar-clientes': 'Editar Clientes',
      'ver-mozos': 'Ver Mozos',
      'editar-mozos': 'Editar Mozos',
      'gestionar-roles': 'Gestionar Roles',
      'ver-auditoria': 'Ver Auditoría',
      'ver-reportes': 'Ver Reportes',
      'cierre-caja': 'Cierre de Caja',
      'ver-notificaciones': 'Ver Notificaciones',
      'crear-comandas': 'Crear Comandas',
      'editar-comandas': 'Editar Comandas',
      'eliminar-platos-comandas': 'Eliminar Platos/Comandas',
      'procesar-pagos': 'Procesar Pagos',
      'asociar-clientes': 'Asociar Clientes',
      'ver-comandas-cocina': 'Ver Comandas Cocina',
      'cambiar-estados-platos': 'Cambiar Estados',
      'revertir-comandas': 'Revertir Comandas'
    },
    activeNav: 'usuarios',
    pageTitle: 'Usuarios',

    async init() {
      const token = localStorage.getItem('adminToken') || sessionStorage.getItem('adminToken');
      if (!token) {
        window.location.href = '/login.html';
        return;
      }
      await this.loadRoles();
      await this.loadUsuarios();
    },

    async loadRoles() {
      try {
        const res = await apiGet('/roles');
        if (res && res.success) {
          this.roles = res.data || [];
        }
      } catch (e) {
        console.error('Error cargando roles:', e);
      }
    },
    
    async loadUsuarios() {
      this.loading = true;
      const data = await apiGet('/mozos');
      let raw = [];
      if (data && Array.isArray(data)) raw = data;
      else if (data && data.mozos) raw = data.mozos;
      
      // Normalizar campos del modelo real a los esperados por la UI
      this.usuarios = raw.map(m => ({
        ...m,
        nombre: m.name || m.nombre || '—',
        dni: m.DNI?.toString() || m.dni || '—',
        telefono: m.phoneNumber?.toString() || m.telefono || m.tel || '—',
        activo: m.activo ?? m.isActive ?? true,
        roles: m.roles || (m.rol ? [m.rol] : ['mozos']),
        rol: m.rol || (m.roles?.[0] || 'mozos')
      }));
      this.loading = false;
    },
    
    get usuariosFiltrados() {
      return this.usuarios.filter(u => {
        const matchBusqueda = !this.busqueda || 
          u.nombre?.toLowerCase().includes(this.busqueda.toLowerCase()) ||
          u.dni?.toString().includes(this.busqueda);
        const matchRol = !this.filtroRol || 
          (u.roles && u.roles.includes(this.filtroRol)) || 
          u.rol === this.filtroRol;
        const matchEstado = !this.filtroEstado || 
          (this.filtroEstado === 'activo' && u.activo !== false) ||
          (this.filtroEstado === 'inactivo' && u.activo === false);
        return matchBusqueda && matchRol && matchEstado;
      });
    },
    
    getRolNombre(rol) {
      const rolEncontrado = this.roles.find(r => r.nombre === rol);
      if (rolEncontrado) {
        return rolEncontrado.nombreDisplay || rolEncontrado.nombre;
      }
      return rol ? rol.charAt(0).toUpperCase() + rol.slice(1) : 'Sin rol';
    },

    getRolColor(rol) {
      const rolEncontrado = this.roles.find(r => r.nombre === rol);
      return rolEncontrado?.color || 'st-libre';
    },
    
    getPermisosRol(rol) {
      const permisosRol = this.PERMISOS_POR_ROL[rol] || {};
      const todos = [];
      Object.values(permisosRol).forEach(lista => todos.push(...lista));
      return todos;
    },
    
    getPermisosAgrupados(rol) {
      const permisosRol = this.PERMISOS_POR_ROL[rol] || {};
      const grupos = [];
      for (const [nombreGrupo, permisos] of Object.entries(permisosRol)) {
        grupos.push({
          nombre: nombreGrupo,
          icono: nombreGrupo.includes('Dashboard') ? '📊' : nombreGrupo.includes('Mozos') ? '📱' : '🍳',
          permisos: permisos.map(p => ({
            id: p,
            nombre: this.PERMISOS_NOMBRES[p] || p,
            activo: true,
            rolesOrigen: [rol]
          }))
        });
      }
      return grupos;
    },
    
    getPermisosRolesSeleccionados() {
      const roles = this.formUsuario.roles || [];
      const todos = new Set();
      roles.forEach(rol => {
        this.getPermisosRol(rol).forEach(p => todos.add(p));
      });
      return Array.from(todos);
    },
    
    getPermisosAgrupadosRoles(roles) {
      if (!roles || roles.length === 0) return [];
      
      // Combinar permisos de todos los roles
      const permisosCombinados = {};
      
      roles.forEach(rol => {
        const permisosRol = this.PERMISOS_POR_ROL[rol] || {};
        for (const [nombreGrupo, permisos] of Object.entries(permisosRol)) {
          if (!permisosCombinados[nombreGrupo]) {
            permisosCombinados[nombreGrupo] = {};
          }
          permisos.forEach(p => {
            if (!permisosCombinados[nombreGrupo][p]) {
              permisosCombinados[nombreGrupo][p] = {
                id: p,
                nombre: this.PERMISOS_NOMBRES[p] || p,
                activo: true,
                rolesOrigen: []
              };
            }
            permisosCombinados[nombreGrupo][p].rolesOrigen.push(rol);
          });
        }
      });
      
      // Convertir a array de grupos
      const grupos = [];
      for (const [nombreGrupo, permisos] of Object.entries(permisosCombinados)) {
        grupos.push({
          nombre: nombreGrupo,
          icono: nombreGrupo.includes('Dashboard') ? '📊' : nombreGrupo.includes('Mozos') ? '📱' : '🍳',
          permisos: Object.values(permisos)
        });
      }
      return grupos;
    },
    
    toggleRol(rolNombre) {
      if (!this.formUsuario.roles) {
        this.formUsuario.roles = [];
      }
      const index = this.formUsuario.roles.indexOf(rolNombre);
      if (index > -1) {
        // No permitir quitar el último rol
        if (this.formUsuario.roles.length > 1) {
          this.formUsuario.roles.splice(index, 1);
        }
      } else {
        this.formUsuario.roles.push(rolNombre);
      }
    },
    
    openCreateModal() {
      this.isEditing = false;
      this.mostrarPermisos = false;
      const rolDefecto = this.roles.length > 0 ? [this.roles[0].nombre] : ['mozos'];
      this.formUsuario = { _id: null, nombre: '', dni: '', telefono: '', roles: rolDefecto, activo: true, permisosPersonalizados: [] };
      this.modal = true;
    },
    
    openEditModal(m) {
      this.isEditing = true;
      this.mostrarPermisos = false;
      // Soportar tanto el campo 'roles' (array) como 'rol' (string único)
      const rolesUsuario = m.roles || (m.rol ? [m.rol] : ['mozos']);
      this.formUsuario = {
        _id: m._id,
        nombre: m.nombre || m.name || '',
        dni: m.dni || m.DNI?.toString() || '',
        telefono: m.telefono || m.phoneNumber?.toString() || '',
        roles: rolesUsuario,
        activo: m.activo !== false,
        permisosPersonalizados: m.permisos || []
      };
      this.modal = true;
    },
    
    async guardarUsuario() {
      if (!this.formUsuario.nombre.trim()) {
        this.showToast('El nombre es requerido', 'error');
        return;
      }
      
      if (!this.formUsuario.dni.trim()) {
        this.showToast('El DNI es requerido', 'error');
        return;
      }
      
      if (!this.formUsuario.roles || this.formUsuario.roles.length === 0) {
        this.showToast('Debe seleccionar al menos un rol', 'error');
        return;
      }
      
      const isEdit = !!this.formUsuario._id;
      const body = {
        name: this.formUsuario.nombre,
        DNI: parseInt(this.formUsuario.dni) || 0,
        phoneNumber: parseInt(this.formUsuario.telefono) || 0,
        roles: this.formUsuario.roles,
        rol: this.formUsuario.roles[0], // Rol principal (compatibilidad)
        activo: this.formUsuario.activo,
      };
      
      const res = isEdit
        ? await apiPut('/mozos/' + this.formUsuario._id, body)
        : await apiPost('/mozos', body);
      
      if (res && !res.error) {
        await this.loadUsuarios();
        this.modal = null;
        this.showToast(isEdit ? 'Usuario actualizado ✅' : 'Usuario creado ✅');
      } else {
        this.showToast('Error: ' + (res?.error || res?.message || 'Fallo al guardar'), 'error');
      }
    },
    
    async eliminarUsuario(id) {
      if (!confirm('¿Eliminar este usuario?')) return;
      const res = await apiDelete('/mozos/' + id);
      if (res && !res.error) {
        await this.loadUsuarios();
        this.showToast('Usuario eliminado');
      } else {
        this.showToast('Error al eliminar', 'error');
      }
    },
    
    async toggleActivo(m) {
      const res = await apiPut('/mozos/' + m._id, { activo: !m.activo });
      if (res && !res.error) {
        m.activo = !m.activo;
        this.showToast(m.activo ? 'Usuario activado ✅' : 'Usuario desactivado');
      }
    },
    
    showToast(msg, type = 'success') {
      const container = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = 'px-4 py-3 rounded-xl text-sm font-medium shadow-xl ' +
        (type === 'error' ? 'bg-st-pagado text-white' : 'bg-st-preparado text-white');
      t.textContent = msg;
      container.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    },
    
    logout() {
      localStorage.removeItem('adminToken');
      window.location.href = '/login';
    }
  };
}
