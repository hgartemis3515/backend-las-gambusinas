<!-- TOPBAR (72px) - Componente compartido -->
<!-- Incluir cosmos-search.css, cosmos-search.js, notificaciones-dashboard.js -->
<nav class="h-[72px] bg-bg-sidebar border-b border-[rgba(212,175,55,0.25)] flex items-center px-4 fixed top-0 left-0 right-0 z-40">
  <!-- Left Zone -->
  <div class="flex items-center gap-3 w-[280px]">
    <button @click="sidebarOpen = !sidebarOpen" class="w-11 h-11 flex items-center justify-center rounded-lg hover:bg-gold-20 text-gold text-xl">☰</button>
    <div class="text-txt-secondary text-sm">🏠 <span class="mx-1">›</span> <span class="text-white" x-text="pageTitle"></span></div>
  </div>
  
  <!-- Center Zone - COSMOS SEARCH TRIGGER -->
  <div class="flex-1 max-w-[500px] mx-auto relative">
    <!-- Cosmos Search Bar (Trigger) -->
    <div class="cosmos-search-trigger" style="position: relative; top: 0;">
      <div class="cosmos-search-box gold-theme" role="button" tabindex="0" aria-label="Abrir búsqueda (Ctrl+K)">
        <span class="cosmos-search-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
        </span>
        <input 
          type="text" 
          class="cosmos-search-input" 
          placeholder="Buscar platos, mesas, comandas, clientes, bouchers..." 
          readonly 
          tabindex="-1"
        >
        <span class="cosmos-search-kbd">
          <span>⌘</span>
          <span>K</span>
        </span>
      </div>
    </div>
  </div>
  
  <!-- Right Zone -->
  <div class="flex items-center gap-3 ml-4">
    <div class="text-right mr-2 hidden lg:block">
      <p id="clock" class="text-white text-sm font-semibold tabular-nums">--:--:--</p>
      <p id="dateStr" class="text-txt-muted text-[11px]">--</p>
    </div>
    <div class="w-px h-8 bg-[rgba(212,175,55,0.15)] hidden lg:block"></div>
    <div class="hidden lg:flex items-center gap-1.5 px-2">
      <span class="w-2 h-2 rounded-full bg-st-preparado pulse-dot"></span>
      <span class="text-xs text-st-preparado font-medium">Online</span>
      <span class="text-[10px] text-txt-muted ml-1">8 mozos</span>
    </div>
    <div class="w-px h-8 bg-[rgba(212,175,55,0.15)] hidden lg:block"></div>
    <!-- Shortcuts -->
    <div class="relative" x-data="{open:false}">
      <button @click="open=!open" class="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-gold-20 text-lg">⚡</button>
      <div x-show="open" @click.outside="open=false" x-transition class="absolute right-0 top-12 w-64 bg-bg-card border border-[rgba(212,175,55,0.25)] rounded-xl shadow-2xl p-2 z-50">
        <p class="text-gold font-semibold text-sm px-3 py-2">⚡ Atajos Rápidos</p>
        <a href="/comandas.html" class="flex items-center justify-between px-3 py-2 rounded-lg hover:bg-gold-20 cursor-pointer">
          <span class="text-sm">📋 Ver Comandas</span>
          <span class="text-[10px] text-txt-muted bg-bg-sidebar px-1.5 py-0.5 rounded">Ctrl+N</span>
        </a>
        <a href="/mesas.html" class="flex items-center justify-between px-3 py-2 rounded-lg hover:bg-gold-20 cursor-pointer">
          <span class="text-sm">🪑 Ver mapa mesas</span>
          <span class="text-[10px] text-txt-muted bg-bg-sidebar px-1.5 py-0.5 rounded">Ctrl+M</span>
        </a>
        <a href="/reportes.html" class="flex items-center justify-between px-3 py-2 rounded-lg hover:bg-gold-20 cursor-pointer">
          <span class="text-sm">📊 Abrir reportes</span>
          <span class="text-[10px] text-txt-muted bg-bg-sidebar px-1.5 py-0.5 rounded">Ctrl+R</span>
        </a>
        <a href="/configuracion.html" class="flex items-center justify-between px-3 py-2 rounded-lg hover:bg-gold-20 cursor-pointer">
          <span class="text-sm">⚙️ Configuración</span>
          <span class="text-[10px] text-txt-muted bg-bg-sidebar px-1.5 py-0.5 rounded">Ctrl+,</span>
        </a>
        <div class="flex items-center justify-between px-3 py-2 rounded-lg hover:bg-gold-20 cursor-pointer" @click="if(window.cosmosSearch) cosmosSearch.open()">
          <span class="text-sm">🔍 Buscar</span>
          <span class="text-[10px] text-txt-muted bg-bg-sidebar px-1.5 py-0.5 rounded">Ctrl+K</span>
        </div>
      </div>
    </div>
    <!-- Notifications (Sistema Real) -->
    <div class="relative" x-data="{open:false}" id="notificaciones-wrapper">
      <button 
        @click="open=!open" 
        class="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-gold-20 text-lg relative"
        data-notificaciones-trigger
      >
        🔔
        <span 
          id="notificaciones-badge" 
          class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-st-pagado rounded-full text-[9px] font-bold flex items-center justify-center hidden"
        >0</span>
      </button>
      <div 
        x-show="open" 
        @click.outside="open=false" 
        x-transition 
        id="notificaciones-dropdown"
        class="absolute right-0 top-12 w-80 bg-bg-card border border-[rgba(212,175,55,0.25)] rounded-xl shadow-2xl z-50"
      >
        <div id="notificaciones-container">
          <!-- Contenido dinámico por notificaciones-dashboard.js -->
          <div class="px-4 py-8 text-center text-txt-muted text-sm">
            <span class="text-2xl block mb-2 animate-pulse">🔔</span>
            Cargando notificaciones...
          </div>
        </div>
      </div>
    </div>
    <!-- Profile -->
    <div class="relative" x-data="topbarProfile()">
      <button @click="open=!open" class="relative">
        <div class="w-9 h-9 rounded-full bg-gold flex items-center justify-center text-bg-primary font-bold text-sm border-2 border-[rgba(212,175,55,0.4)] overflow-hidden">
          <img x-show="user.foto" :src="user.foto" class="w-full h-full object-cover" alt="Foto">
          <span x-show="!user.foto" x-text="user.iniciales || 'A'"></span>
        </div>
        <span class="absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full bg-st-preparado border-2 border-bg-sidebar"></span>
      </button>
      <div x-show="open" @click.outside="open=false" x-transition class="absolute right-0 top-12 w-72 bg-bg-card border border-[rgba(212,175,55,0.25)] rounded-xl shadow-2xl z-50">
        <div class="text-center py-5 border-b border-[rgba(212,175,55,0.1)]">
          <div class="w-16 h-16 rounded-full bg-gold mx-auto flex items-center justify-center text-bg-primary font-bold text-2xl mb-2 overflow-hidden border-2 border-[rgba(212,175,55,0.4)]">
            <img x-show="user.foto" :src="user.foto" class="w-full h-full object-cover" alt="Foto">
            <span x-show="!user.foto" x-text="user.iniciales || 'A'"></span>
          </div>
          <p class="font-semibold" x-text="user.nombre || 'Admin Principal'"></p>
          <p class="text-xs text-txt-muted" x-text="user.email || 'admin@lasgambusinas.com'"></p>
          <span class="inline-block mt-1.5 text-[10px] font-bold bg-gold text-bg-primary px-2.5 py-0.5 rounded-full" x-text="user.rol || 'Administrador'"></span>
        </div>
        <div class="p-2">
          <a href="/configuracion.html#perfil" class="px-3 py-2 rounded-lg hover:bg-gold-20 cursor-pointer text-sm block">👤 Mi perfil</a>
          <a href="/configuracion.html" class="px-3 py-2 rounded-lg hover:bg-gold-20 cursor-pointer text-sm block">⚙️ Configuración</a>
          <div class="flex items-center justify-between px-3 py-2">
            <span class="text-sm">🎨 Modo oscuro</span>
            <div class="w-9 h-5 bg-gold rounded-full relative cursor-pointer"><div class="absolute right-0.5 top-0.5 w-4 h-4 bg-white rounded-full"></div></div>
          </div>
          <div class="border-t border-[rgba(212,175,55,0.1)] mt-1 pt-1">
            <div @click="logout()" class="px-3 py-2 rounded-lg hover:bg-[rgba(255,71,87,0.1)] cursor-pointer text-sm text-st-pagado">🚪 Cerrar sesión</div>
          </div>
        </div>
        <div class="px-4 py-2 border-t border-[rgba(212,175,55,0.1)] text-[10px] text-txt-muted">v2.0.0-fase7 · Sesión: <span x-text="sessionTime"></span></div>
      </div>
    </div>
  </div>
</nav>
