<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vouchers — Las Gambusinas</title>
  <!-- Animate.css - Animaciones CSS puras -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <!-- AOS - Animate On Scroll -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bg: { primary: '#0a0a0f', card: '#1a1a28', sidebar: '#12121a' },
        gold: { DEFAULT: '#d4af37', '20': 'rgba(212,175,55,0.125)', '40': 'rgba(212,175,55,0.25)' },
        st: { libre: '#00d4aa', esperando: '#ffa502', pedido: '#3498db', preparado: '#2ecc71', pagado: '#ff4757', reservado: '#5352ed' },
        txt: { primary: '#ffffff', secondary: '#a0a0b8', muted: '#5a5a7a' }
      },
      fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
    }
  }
}
</script>
<link rel="stylesheet" href="/assets/css/dashboard.css">
<link rel="stylesheet" href="/assets/css/animations.css">
<link rel="stylesheet" href="/assets/css/page-transitions.css">
</head>
<body class="bg-bg-primary text-white font-sans antialiased min-h-screen" x-data="bouchersApp()" x-cloak>

<div id="topbar-container"></div>
<div class="flex pt-[72px] min-h-screen">
  <div id="sidebar-container"></div>
  <main :class="sidebarOpen ? 'ml-[270px]' : 'ml-[68px]'" class="flex-1 transition-all duration-300 min-h-[calc(100vh-72px)] p-6">
    
    <!-- HEADER -->
    <div class="flex items-center justify-between mb-5">
      <h1 class="text-xl font-bold">Vouchers</h1>
      <button @click="loadBouchers()" class="px-4 py-2 border border-txt-muted/30 rounded-lg text-sm text-txt-secondary hover:border-gold hover:text-gold transition">🔄 Actualizar</button>
    </div>

    <!-- FILTROS -->
    <div class="flex gap-2 mb-5 flex-wrap items-center">
      <!-- Filtro Código -->
      <input type="text" x-model="filterCodigo" @input="filterBouchers()" class="bg-bg-sidebar border border-[rgba(212,175,55,0.25)] rounded-lg px-3 py-2 text-sm w-32 placeholder-txt-muted" placeholder="Código">
      
      <!-- Filtro N° Voucher -->
      <input type="text" x-model="filterNumero" @input="filterBouchers()" class="bg-bg-sidebar border border-[rgba(212,175,55,0.25)] rounded-lg px-3 py-2 text-sm w-32 placeholder-txt-muted" placeholder="# Voucher">
      
      <!-- Filtro Mozo -->
      <select x-model="filterMozo" @change="filterBouchers()" class="bg-bg-sidebar border border-[rgba(212,175,55,0.25)] rounded-lg px-3 py-2 text-sm text-txt-secondary min-w-[140px]">
        <option value="">Mozo: Todos</option>
        <template x-for="mozo in mozosList" :key="mozo">
          <option :value="mozo" x-text="mozo"></option>
        </template>
      </select>
      
      <!-- Filtro Fecha Desde -->
      <div class="flex items-center gap-1">
        <span class="text-xs text-txt-muted">Desde:</span>
        <input type="date" x-model="filterFechaDesde" @change="filterBouchers()" class="bg-bg-sidebar border border-[rgba(212,175,55,0.25)] rounded-lg px-2 py-2 text-sm text-txt-secondary w-36">
      </div>
      
      <!-- Filtro Fecha Hasta -->
      <div class="flex items-center gap-1">
        <span class="text-xs text-txt-muted">Hasta:</span>
        <input type="date" x-model="filterFechaHasta" @change="filterBouchers()" class="bg-bg-sidebar border border-[rgba(212,175,55,0.25)] rounded-lg px-2 py-2 text-sm text-txt-secondary w-36">
      </div>
      
      <!-- Botón limpiar filtros -->
      <button @click="limpiarFiltros()" x-show="filterCodigo || filterNumero || filterMozo || filterFechaDesde || filterFechaHasta" 
        class="px-3 py-2 text-xs text-txt-muted hover:text-gold transition border border-transparent hover:border-gold/30 rounded-lg">
        ✕ Limpiar
      </button>
    </div>

    <!-- LOADING STATE -->
    <div x-show="loading && bouchers.length === 0" class="flex items-center justify-center h-32">
      <div class="w-6 h-6 border-2 border-gold border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- TABLA -->
    <div x-show="!loading || bouchers.length > 0" class="bg-bg-card border border-[rgba(212,175,55,0.15)] rounded-xl overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr class="bg-bg-sidebar text-txt-secondary text-[11px] uppercase">
          <th class="text-left px-4 py-3 font-semibold">Código</th>
          <th class="text-left px-4 py-3 font-semibold">N° Voucher</th>
          <th class="text-left px-4 py-3 font-semibold">Fecha</th>
          <th class="text-left px-4 py-3 font-semibold">Mozo</th>
          <th class="text-left px-4 py-3 font-semibold">Mesa</th>
          <th class="text-left px-4 py-3 font-semibold">Total</th>
          <th class="text-left px-4 py-3 font-semibold">Método</th>
          <th class="text-left px-4 py-3 font-semibold">Acciones</th>
        </tr></thead>
        <tbody>
          <tr x-show="filteredBouchers.length === 0">
            <td colspan="8" class="px-4 py-8 text-center text-txt-muted">No hay vouchers registrados</td>
          </tr>
          <template x-for="b in filteredBouchers" :key="b._id || b.codigo">
            <tr class="border-b border-[rgba(212,175,55,0.08)] table-row">
              <td class="px-4 py-3 text-txt-muted font-mono text-xs" x-text="b.codigo || b._id?.slice(-12)"></td>
              <td class="px-4 py-3 font-medium" x-text="'#' + (b.numero || b.boucherNumber || b.numBoucher || '—')"></td>
              <td class="px-4 py-3 text-txt-secondary" x-text="b.fecha || (b.fechaPago ? new Date(b.fechaPago).toLocaleString('es-PE') : (b.createdAt ? new Date(b.createdAt).toLocaleString('es-PE') : '—'))"></td>
              <td class="px-4 py-3 text-txt-secondary" x-text="b.mozo?.name || b.mozo?.nombre || b.nombreMozo || '—'"></td>
              <td class="px-4 py-3" x-text="'Mesa ' + (b.mesa?.nummesa || b.mesa?.numMesa || b.numMesa || b.mesa || '—')"></td>
              <td class="px-4 py-3 text-gold font-semibold" x-text="'S/. ' + Number(b.montoDescuento > 0 ? (b.totalConDescuento != null ? b.totalConDescuento : b.total) : (b.total || 0)).toFixed(2)"></td>
              <td class="px-4 py-3">
                <span class="text-xs px-2 py-0.5 rounded-full"
                  :class="b.metodoPago === 'Efectivo' || b.metodo === 'Efectivo' ? 'bg-st-preparado/20 text-st-preparado' : b.metodoPago === 'Tarjeta' || b.metodo === 'Tarjeta' ? 'bg-st-pedido/20 text-st-pedido' : 'bg-st-reservado/20 text-st-reservado'"
                  x-text="b.metodoPago || b.metodo || '—'"></span>
              </td>
              <td class="px-4 py-3 space-x-2 text-base whitespace-nowrap">
                <span class="cursor-pointer hover:text-[#d4af37] transition" @click="openDetailModal(b)" title="Ver voucher">👁</span>
                <span class="cursor-pointer hover:text-[#d4af37] transition" @click="imprimirVoucher(b)" title="Imprimir PDF">🖨️</span>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

  </main>
</div>

<!-- MODAL: VER VOUCHER — Diseño según pencil-new.pen frame Z1h1R -->
<div x-show="modal" x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70" @click.self="modal=null">
  <div class="bg-[#1a1a28] border border-[rgba(212,175,55,0.25)] rounded-2xl w-[720px] max-h-[90vh] overflow-y-auto shadow-2xl" @click.stop>
    
    <!-- HEADER -->
    <div class="bg-[#12121a] p-5 rounded-t-2xl sticky top-0 z-10 flex items-center justify-between">
      <div>
        <h2 class="text-lg font-bold" x-text="'Voucher #' + (selectedBoucher?.boucherNumber || selectedBoucher?.numero || selectedBoucher?.numBoucher || '—')"></h2>
        <p class="text-xs text-[#5a5a7a] mt-0.5">
          <span x-text="'Mesa ' + (selectedBoucher?.mesa?.nummesa || selectedBoucher?.mesa?.numMesa || selectedBoucher?.numMesa || selectedBoucher?.mesa || '—')"></span>
          <span> · </span>
          <span x-text="selectedBoucher?.fechaPago ? new Date(selectedBoucher.fechaPago).toLocaleDateString('es-PE', {weekday:'short', day:'numeric', month:'short', year:'numeric'}) : (selectedBoucher?.fecha || '—')"></span>
          <span x-show="selectedBoucher?.fechaPago"> · </span>
          <span x-show="selectedBoucher?.fechaPago" x-text="selectedBoucher?.fechaPago ? new Date(selectedBoucher.fechaPago).toLocaleTimeString('es-PE', {hour:'2-digit', minute:'2-digit'}) : ''"></span>
        </p>
      </div>
      <button @click="modal=null" class="w-8 h-8 flex items-center justify-center rounded-full bg-[rgba(212,175,55,0.1)] text-[#d4af37] hover:bg-[rgba(212,175,55,0.2)] transition text-sm font-bold">✕</button>
    </div>

    <div class="p-5 space-y-4">
      
      <!-- TOTALES PROMINENTES -->
      <div class="bg-[#0a0a0f] border border-[rgba(212,175,55,0.2)] rounded-xl p-5">
        <div class="flex items-start justify-between gap-8">
          <div class="space-y-2.5 text-sm flex-1">
            <div class="flex justify-between">
              <span class="text-[#a0a0b8]">Subtotal</span>
              <span class="font-medium" x-text="'S/. ' + Number(selectedBoucher?.subtotal || 0).toFixed(2)"></span>
            </div>
            <div class="flex justify-between">
              <span class="text-[#ffa502]">IGV (18%)</span>
              <span class="text-[#ffa502] font-medium" x-text="'S/. ' + Number(selectedBoucher?.igv || 0).toFixed(2)"></span>
            </div>
            <div x-show="selectedBoucher?.propina > 0" class="flex justify-between">
              <span class="text-[#2ecc71]">Propina</span>
              <span class="text-[#2ecc71] font-medium" x-text="'S/. ' + Number(selectedBoucher?.propina || 0).toFixed(2)"></span>
            </div>
            <!-- Sección de descuentos -->
            <template x-if="selectedBoucher?.montoDescuento > 0 || (selectedBoucher?.descuentos && selectedBoucher.descuentos.length > 0)">
              <div class="py-2 border-t border-b border-[rgba(212,175,55,0.15)] my-1">
                <p class="text-[#d4af37] text-xs font-semibold mb-1">🎁 Descuento Aplicado</p>
                <template x-for="(desc, idx) in (selectedBoucher?.descuentos || [])" :key="idx">
                  <div class="flex justify-between text-xs">
                    <span class="text-[#d4af37]" x-text="desc.porcentaje + '%' + (desc.motivo ? ' - ' + desc.motivo : '')"></span>
                    <span class="text-[#d4af37] font-medium" x-text="'- S/. ' + Number(desc.monto || 0).toFixed(2)"></span>
                  </div>
                </template>
                <div x-show="selectedBoucher?.montoDescuento > 0" class="flex justify-between text-xs font-semibold mt-1">
                  <span class="text-[#2ecc71]">Ahorro Total</span>
                  <span class="text-[#2ecc71]" x-text="'- S/. ' + Number(selectedBoucher?.montoDescuento || 0).toFixed(2)"></span>
                </div>
              </div>
            </template>
            <div class="flex justify-between pt-2 border-t border-[rgba(212,175,55,0.2)]">
              <span class="font-bold text-base" x-text="selectedBoucher?.montoDescuento > 0 ? 'TOTAL FINAL' : 'TOTAL'"></span>
              <span class="text-[#d4af37] font-bold text-2xl" x-text="'S/. ' + Number(selectedBoucher?.montoDescuento > 0 ? (selectedBoucher.totalConDescuento != null ? selectedBoucher.totalConDescuento : selectedBoucher.total) : (selectedBoucher?.total || 0)).toFixed(2)"></span>
            </div>
          </div>
          <div class="text-right space-y-3 text-xs text-[#5a5a7a] min-w-[120px]">
            <div>
              <p>Voucher ID</p>
              <p class="text-[#d4af37] font-mono font-semibold text-[11px]" x-text="(selectedBoucher?.voucherId || selectedBoucher?._id?.slice(-8) || '—')"></p>
            </div>
            <div>
              <p>Comprobante</p>
              <p class="text-white font-medium">Boleta</p>
            </div>
          </div>
        </div>
      </div>

      <!-- TABLA DE ÍTEMS -->
      <div class="bg-[#0a0a0f] border border-[rgba(212,175,55,0.15)] rounded-xl overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-[#12121a] text-[#a0a0b8] text-[10px] uppercase">
              <th class="text-left px-4 py-2.5 font-semibold">Plato</th>
              <th class="text-center px-3 py-2.5 font-semibold">Cant.</th>
              <th class="text-right px-3 py-2.5 font-semibold">Precio</th>
              <th class="text-left px-3 py-2.5 font-semibold">Complementos</th>
              <th class="text-right px-3 py-2.5 font-semibold">Subtotal</th>
            </tr>
          </thead>
          <tbody>
            <template x-if="!selectedBoucher?.platos || selectedBoucher.platos.length === 0">
              <tr><td colspan="5" class="px-4 py-6 text-center text-[#5a5a7a] text-xs">Sin ítems registrados</td></tr>
            </template>
            <template x-for="(item, idx) in (selectedBoucher?.platos || [])" :key="idx">
              <tr class="border-b border-[rgba(212,175,55,0.08)]">
                <td class="px-4 py-3 font-medium" x-text="item.nombre || item.plato?.nombre || '—'"></td>
                <td class="px-3 py-3 text-center" x-text="item.cantidad || 1"></td>
                <td class="px-3 py-3 text-right text-[#a0a0b8]" x-text="'S/. ' + Number(item.precio || 0).toFixed(2)"></td>
                <td class="px-3 py-3">
                  <template x-if="item.complementosSeleccionados && item.complementosSeleccionados.length > 0">
                    <div class="flex flex-wrap gap-1">
                      <template x-for="comp in item.complementosSeleccionados" :key="comp.grupo">
                        <span class="text-[9px] px-1.5 py-0.5 rounded bg-[rgba(212,175,55,0.1)] text-[#d4af37]" x-text="comp.grupo + ': ' + comp.opcion"></span>
                      </template>
                    </div>
                  </template>
                  <template x-if="!item.complementosSeleccionados || item.complementosSeleccionados.length === 0">
                    <span class="text-[10px] text-[#5a5a7a]">—</span>
                  </template>
                </td>
                <td class="px-3 py-3 text-right text-[#d4af37] font-semibold" x-text="'S/. ' + Number(item.subtotal || (item.cantidad || 1) * (item.precio || 0)).toFixed(2)"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- INFO DE PAGO -->
      <div class="bg-[#0a0a0f] border border-[rgba(212,175,55,0.15)] rounded-xl p-4">
        <p class="text-[10px] text-[#5a5a7a] uppercase mb-3 font-semibold tracking-wider">Información de Pago</p>
        <div class="grid grid-cols-2 gap-x-6 gap-y-2.5 text-sm">
          <div class="flex justify-between">
            <span class="text-[#5a5a7a]">Método de pago</span>
            <span class="font-medium text-[#2ecc71]" x-text="selectedBoucher?.metodoPago || selectedBoucher?.metodo || '—'"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-[#5a5a7a]">Mozo</span>
            <span class="font-medium" x-text="selectedBoucher?.mozo?.name || selectedBoucher?.nombreMozo || selectedBoucher?.mozo?.nombre || '—'"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-[#5a5a7a]">Hora de pago</span>
            <span class="font-medium" x-text="selectedBoucher?.fechaPago ? new Date(selectedBoucher.fechaPago).toLocaleTimeString('es-PE', {hour:'2-digit', minute:'2-digit'}) : (selectedBoucher?.hora || '—')"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-[#5a5a7a]">Serie / ID</span>
            <span class="font-mono text-xs font-medium" x-text="selectedBoucher?.voucherId || selectedBoucher?._id?.slice(-12) || '—'"></span>
          </div>
        </div>
      </div>

    </div>

    <!-- FOOTER -->
    <div class="bg-[#12121a] p-4 rounded-b-2xl flex justify-between items-center border-t border-[rgba(212,175,55,0.1)]">
      <button @click="anularVoucher()" class="px-4 py-2 border border-[#ff4757] text-[#ff4757] rounded-lg text-sm font-medium hover:bg-[#ff4757]/10 transition">Anular</button>
      <div class="flex gap-2">
        <button @click="modal=null" class="px-4 py-2 border border-[#5a5a7a]/40 rounded-lg text-sm text-[#a0a0b8] hover:border-[#d4af37] hover:text-[#d4af37] transition">Cerrar</button>
        <button @click="imprimirVoucher(selectedBoucher)" class="px-4 py-2 bg-[#d4af37] text-[#0a0a0f] rounded-lg text-sm font-semibold hover:brightness-110 transition">🖨 Reimprimir</button>
      </div>
    </div>
  </div>
</div>

<script src="/assets/js/shared.js"></script>
<script>
function bouchersApp() {
  return {
    sidebarOpen: true,
    modal: null,
    loading: true,
    bouchers: [],
    filteredBouchers: [],
    selectedBoucher: null,
    activeNav: 'bouchers',
    pageTitle: 'Vouchers',
    
    // Filtros
    filterCodigo: '',
    filterNumero: '',
    filterMozo: '',
    filterFechaDesde: '',
    filterFechaHasta: '',
    mozosList: [],
    
    async init() {
      const token = localStorage.getItem('adminToken') || sessionStorage.getItem('adminToken');
      if (!token) {
        window.location.href = '/login.html';
        return;
      }
      await this.loadBouchers();
    },
    
    async loadBouchers() {
      this.loading = true;
      // Endpoint real es /boucher (singular)
      let data = await apiGet('/boucher');
      if (!data) data = await apiGet('/bouchers');
      
      let raw = [];
      if (data && Array.isArray(data)) raw = data;
      else if (data && data.bouchers) raw = data.bouchers;
      else if (data && data.data) raw = data.data;
      
      // Normalizar campos
      this.bouchers = raw.map(b => {
        // FIX: Limpiar totalConDescuento=0 heredado del default viejo en bouchers sin descuento real
        const tieneDescuentoReal = (b.montoDescuento > 0) || (b.descuentos && b.descuentos.length > 0);
        return {
          ...b,
          numero: b.boucherNumber || b.numero || b.numBoucher,
          mesa: b.mesa || { numMesa: b.numMesa },
          mozo: b.mozo || { nombre: b.nombreMozo },
          fecha: b.fechaPago ? new Date(b.fechaPago).toLocaleString('es-PE') : b.fecha,
          // Si no tiene descuento real, ignorar totalConDescuento (puede ser 0 por default viejo)
          totalConDescuento: tieneDescuentoReal ? b.totalConDescuento : null,
        };
      });
      
      // Extraer mozos unicos
      this.extraerMozosUnicos();
      
      this.filterBouchers();
      this.loading = false;
    },
    
    extraerMozosUnicos() {
      const mozosSet = new Set();
      this.bouchers.forEach(b => {
        const nombreMozo = b.mozo?.name || b.mozo?.nombre || b.nombreMozo;
        if (nombreMozo && nombreMozo !== '—') {
          mozosSet.add(nombreMozo);
        }
      });
      this.mozosList = Array.from(mozosSet).sort();
    },
    
    filterBouchers() {
      this.filteredBouchers = this.bouchers.filter(b => {
        // Filtro por codigo
        const codigo = b.codigo || b._id?.slice(-12) || '';
        const matchCodigo = !this.filterCodigo || String(codigo).toLowerCase().includes(this.filterCodigo.toLowerCase());
        
        // Filtro por numero de voucher
        const numero = b.numero || b.boucherNumber || b.numBoucher || '';
        const matchNumero = !this.filterNumero || String(numero).toLowerCase().includes(this.filterNumero.toLowerCase());
        
        // Filtro por mozo
        const nombreMozo = b.mozo?.name || b.mozo?.nombre || b.nombreMozo || '';
        const matchMozo = !this.filterMozo || nombreMozo === this.filterMozo;
        
        // Filtro por fecha desde
        let matchFechaDesde = true;
        const fechaBase = b.fechaPago || b.createdAt;
        if (this.filterFechaDesde && fechaBase) {
          const fechaBoucher = new Date(fechaBase).toISOString().split('T')[0];
          matchFechaDesde = fechaBoucher >= this.filterFechaDesde;
        }
        
        // Filtro por fecha hasta
        let matchFechaHasta = true;
        if (this.filterFechaHasta && fechaBase) {
          const fechaBoucher = new Date(fechaBase).toISOString().split('T')[0];
          matchFechaHasta = fechaBoucher <= this.filterFechaHasta;
        }
        
        return matchCodigo && matchNumero && matchMozo && matchFechaDesde && matchFechaHasta;
      });
    },
    
    limpiarFiltros() {
      this.filterCodigo = '';
      this.filterNumero = '';
      this.filterMozo = '';
      this.filterFechaDesde = '';
      this.filterFechaHasta = '';
      this.filterBouchers();
    },
    
    openDetailModal(b) {
      this.selectedBoucher = b;
      this.modal = true;
    },
    
    imprimirVoucher(v) {
      if (!v) return;
      
      const voucher = v || this.selectedBoucher;
      const items = voucher?.platos || [];
      const fecha = voucher?.fechaPago ? new Date(voucher.fechaPago) : new Date();
      
      // Calcular totales
      const totalSinDescuento = Number(voucher?.totalSinDescuento || voucher?.total || 0);
      const montoDescuento = Number(voucher?.montoDescuento || 0);
      // FIX: Usar totalConDescuento solo si hay descuento real (montoDescuento > 0)
      const tieneDescuentoReal = Number(voucher?.montoDescuento || 0) > 0;
      const total = Number(tieneDescuentoReal && voucher?.totalConDescuento != null ? voucher.totalConDescuento : (voucher?.total || 0));
      const subtotal = Number(voucher?.subtotal || 0);
      const igv = Number(voucher?.igv || 0);
      
      // Información de descuentos
      const descuentos = voucher?.descuentos || [];
