<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Las Gambusinas - Sistema de punto de venta para gestión de restaurante. Iniciar sesión para acceder al panel de control.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="">
  <!-- Open Graph -->
  <meta property="og:title" content="Las Gambusinas - Iniciar Sesión">
  <meta property="og:description" content="Sistema de gestión integral para restaurantes. Accede al panel de control.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Las Gambusinas">
  <meta property="og:locale" content="es_PE">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Las Gambusinas - Iniciar Sesión">
  <meta name="twitter:description" content="Sistema de gestión integral para restaurantes.">
  <title>Las Gambusinas — Iniciar sesión</title>
  <!-- Animate.css - Animaciones CSS puras -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://maxst.icons8.com/vue-static/landings/line-awesome/line-awesome/1.3.0/css/line-awesome.min.css">
  <!-- SEO Meta Tags Manager -->
  <script src="/assets/js/seo-meta.js"></script>
  <style>
    :root {
      --bg-primary: #0f0f17;
      --bg-secondary: #1a1a28;
      --bg-card: #14141f;
      --gold: #d4af37;
      --gold-light: #e8c84a;
      --gold-dark: #a88a2a;
      --gold-40: rgba(212, 175, 55, 0.25);
      --gold-20: rgba(212, 175, 55, 0.15);
      --text-primary: #ffffff;
      --text-muted: #a0a0b8;
      --text-placeholder: #5a5a7a;
      --border-color: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; font-family: 'Inter', system-ui, sans-serif; }
    body {
      background: var(--bg-primary);
      display: flex;
      min-height: 100vh;
      color: var(--text-primary);
      overflow: hidden;
    }
    
    /* Left Panel - Image Side */
    .login-left {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a28 0%, #0f0f17 100%);
    }
    /* Image Slider Background */
    .login-left-bg {
      position: absolute;
      inset: 0;
    }
    .slider-image {
      position: absolute;
      inset: 0;
      background-position: center center;
      background-size: cover;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }
    .slider-image.active {
      opacity: 1;
    }
    /* Ken Burns effect for active image */
    .slider-image.active {
      animation: kenBurns 8s ease-out forwards;
    }
    @keyframes kenBurns {
      0% { transform: scale(1); }
      100% { transform: scale(1.05); }
    }
    .login-left-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(15, 15, 23, 0.25) 0%, rgba(26, 26, 40, 0.15) 100%);
    }
    
    /* Logo in bottom left - Increased size */
    .brand-logo-footer {
      position: absolute;
      bottom: 40px;
      left: 40px;
      z-index: 10;
      width: 220px;
      height: auto;
      filter: drop-shadow(0 6px 30px rgba(212, 175, 55, 0.4));
      opacity: 0.98;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .brand-logo-footer:hover {
      transform: scale(1.05);
      opacity: 1;
    }
    
    /* Right Panel - Form Side */
    .login-right {
      width: 480px;
      min-width: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: var(--bg-card);
      border-left: 1px solid var(--border-color);
      position: relative;
      overflow: hidden;
    }
    .login-right::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 200px;
      background: linear-gradient(180deg, rgba(212, 175, 55, 0.05) 0%, transparent 100%);
      pointer-events: none;
    }
    .form-container {
      width: 100%;
      max-width: 360px;
      position: relative;
      z-index: 1;
    }
    .form-header {
      margin-bottom: 36px;
    }
    .welcome-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--gold-20);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: var(--gold);
      margin-bottom: 16px;
    }
    .welcome-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .welcome-subtitle {
      font-size: 15px;
      color: var(--text-muted);
    }
    
    /* Form Styles */
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-placeholder);
      font-size: 18px;
      pointer-events: none;
      transition: color 0.2s;
    }
    .form-group input {
      width: 100%;
      height: 50px;
      padding: 0 14px 0 44px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      transition: all 0.2s ease;
    }
    .form-group input::placeholder {
      color: var(--text-placeholder);
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(212, 175, 55, 0.05);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }
    .form-group input:focus + .input-icon,
    .form-group input:focus ~ .input-icon {
      color: var(--gold);
    }
    .password-wrap input {
      padding-right: 50px;
    }
    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-placeholder);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: color 0.2s;
    }
    .password-toggle:hover {
      color: var(--gold);
    }
    
    /* Options Row */
    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .checkbox-wrapper input {
      display: none;
    }
    .checkbox-custom {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .checkbox-wrapper input:checked + .checkbox-custom {
      background: var(--gold);
      border-color: var(--gold);
    }
    .checkbox-custom svg {
      opacity: 0;
      transform: scale(0);
      transition: all 0.2s ease;
    }
    .checkbox-wrapper input:checked + .checkbox-custom svg {
      opacity: 1;
      transform: scale(1);
    }
    .checkbox-label {
      font-size: 14px;
      color: var(--text-muted);
    }
    .forgot-link {
      font-size: 14px;
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .forgot-link:hover {
      color: var(--gold-light);
    }
    
    /* Gold Button with Elegant Animation */
    .btn-login {
      width: 100%;
      height: 54px;
      position: relative;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #c9a227 0%, #d4af37 50%, #e8c84a 100%);
    }
    
    /* Animated gold waves */
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        45deg,
        transparent 30%,
        rgba(255, 215, 100, 0.4) 50%,
        transparent 70%
      );
      background-size: 300% 300%;
      animation: goldWave 3s ease-in-out infinite;
    }
    
    /* Pulsing glow effect */
    .btn-login::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 16px;
      background: conic-gradient(
        from 0deg,
        #d4af37,
        #f5e6a3,
        #d4af37,
        #a88a2a,
        #d4af37
      );
      opacity: 0;
      animation: pulseGlow 2s ease-in-out infinite;
      z-index: -1;
      filter: blur(8px);
    }
    
    /* Moving light particles */
    .btn-shine {
      position: absolute;
      top: 0;
      left: -150%;
      width: 60%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 223, 100, 0.3) 30%,
        rgba(255, 255, 255, 0.6) 50%,
        rgba(255, 223, 100, 0.3) 70%,
        transparent 100%
      );
      transform: skewX(-20deg);
      animation: lightSweep 2.5s ease-in-out infinite;
    }
    
    @keyframes goldWave {
      0% { background-position: 100% 100%; }
      50% { background-position: 0% 0%; }
      100% { background-position: 100% 100%; }
    }
    
    @keyframes pulseGlow {
      0%, 100% { opacity: 0; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.05); }
    }
    
    @keyframes lightSweep {
      0% { left: -150%; }
      50%, 100% { left: 200%; }
    }
    
    .btn-login:hover {
      transform: translateY(-3px);
      box-shadow: 
        0 8px 30px rgba(212, 175, 55, 0.6),
        0 0 50px rgba(212, 175, 55, 0.4),
        0 0 80px rgba(212, 175, 55, 0.2);
    }
    
    .btn-login:hover::after {
      animation: pulseGlow 1s ease-in-out infinite;
    }
    
    .btn-login:active {
      transform: translateY(-1px) scale(0.98);
    }
    
    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    
    .btn-login:disabled .btn-shine {
      animation: none;
      left: -150%;
    }
    
    .btn-login:disabled::after {
      animation: none;
      opacity: 0;
    }
    
    .btn-login #btnText {
      position: relative;
      z-index: 1;
      color: #1a1a1a;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.4);
    }
    
    .login-loader {
      display: none;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
    .login-loader.active {
      display: block;
    }
    .login-loader.active ~ #btnText {
      visibility: hidden;
    }
    
    /* Alert */
    .alert-login {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
    }
    .alert-login.show {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .alert-login.alert-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
    }
    
    /* Footer */
    .form-footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
    }
    .footer-text {
      font-size: 14px;
      color: var(--text-muted);
    }
    .footer-text a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
    }
    .version {
      font-size: 12px;
      color: var(--text-placeholder);
      margin-top: 16px;
    }
    
    /* Loading Overlay */
    #loading {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 15, 23, 0.95);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    
    /* Animations */
    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .form-container {
      animation: slideInRight 0.6s ease-out;
    }
    .form-header {
      animation: fadeInUp 0.6s ease-out 0.1s both;
    }
    .form-group:nth-child(1) {
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }
    .form-group:nth-child(2) {
      animation: fadeInUp 0.6s ease-out 0.3s both;
    }
    .options-row {
      animation: fadeInUp 0.6s ease-out 0.4s both;
    }
    .btn-login {
      animation: fadeInUp 0.6s ease-out 0.5s both;
    }
    .form-footer {
      animation: fadeInUp 0.6s ease-out 0.6s both;
    }
    
    /* Error shake */
    @keyframes shakeError {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    .shake-error {
      animation: shakeError 0.5s ease-out;
    }
    
    /* Success fade out */
    @keyframes successFadeOut {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.05); }
    }
    .success-fade-out {
      animation: successFadeOut 0.4s ease-out forwards;
    }
    
    /* Responsive */
    @media (max-width: 1024px) {
      .login-left {
        display: none;
      }
      .login-right {
        width: 100%;
        min-width: 100%;
      }
    }
    @media (max-width: 480px) {
      .login-right {
        padding: 24px;
      }
      .welcome-title {
        font-size: 24px;
      }
      .form-group input {
        height: 46px;
      }
      .btn-login {
        height: 50px;
      }
    }
  </style>
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loading">
    <div class="login-loader active">
      <svg width="48" height="48" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="15" fill="none" stroke="#d4af37" stroke-width="3" stroke-dasharray="70" stroke-dashoffset="35">
          <animate attributeName="stroke-dasharray" values="70;140;70" dur="1.5s" repeatCount="indefinite"/>
          <animate attributeName="stroke-dashoffset" values="0;-70;0" dur="1.5s" repeatCount="indefinite"/>
        </circle>
      </svg>
    </div>
  </div>

  <!-- Left Panel - Image with Logo -->
  <div class="login-left">
    <div class="login-left-bg">
      <div class="slider-image active" style="background-image: url('/assets/img/cocineros-bg.png');"></div>
      <div class="slider-image" style="background-image: url('/assets/img/steptodown.com382489.jpg');"></div>
      <div class="slider-image" style="background-image: url('/assets/img/steptodown.com545411.jpg');"></div>
      <div class="slider-image" style="background-image: url('/assets/img/steptodown.com692175.jpg');"></div>
      <div class="slider-image" style="background-image: url('/assets/img/steptodown.com822069.jpg');"></div>
      <div class="slider-image" style="background-image: url('/assets/img/steptodown.com963693.jpg');"></div>
      <div class="slider-image" style="background-image: url('/assets/img/steptodown.com965318.jpg');"></div>
    </div>
    <div class="login-left-overlay"></div>
    <img src="/assets/img/logo-lasgambusinas.svg" alt="Las Gambusinas Logo" class="brand-logo-footer">
  </div>

  <!-- Right Panel - Login Form -->
  <div class="login-right">
    <div class="form-container">
      <div class="form-header">
        <span class="welcome-badge">
          <i class="las la-shield-alt"></i>
          Acceso Seguro
        </span>
        <h2 class="welcome-title">Bienvenido de vuelta</h2>
        <p class="welcome-subtitle">Ingresa tus credenciales para acceder al sistema</p>
      </div>

      <form id="loginForm">
        <div class="alert-login" id="loginError">
          <i class="las la-exclamation-circle"></i>
          <span></span>
        </div>
        
        <div class="form-group">
          <label for="username">Correo electrónico</label>
          <div class="input-wrapper">
            <input type="text" id="username" name="username" placeholder="admin@lasgambusinas.com" required autocomplete="username">
            <i class="las la-envelope input-icon"></i>
          </div>
        </div>
        
        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper password-wrap">
            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            <i class="las la-lock input-icon"></i>
            <button type="button" class="password-toggle" id="togglePassword" aria-label="Mostrar contraseña">
              <i class="las la-eye"></i>
            </button>
          </div>
        </div>

        <div class="options-row">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="recordarme">
            <span class="checkbox-custom">
              <svg width="12" height="12" fill="none" stroke="#0f0f17" stroke-width="3" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
              </svg>
            </span>
            <span class="checkbox-label">Recordarme</span>
          </label>
          <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          <span class="btn-shine"></span>
          <div class="login-loader" id="btnLoader">
            <svg width="24" height="24" viewBox="0 0 40 40">
              <circle cx="20" cy="20" r="15" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-dasharray="70" stroke-dashoffset="35">
                <animate attributeName="stroke-dasharray" values="70;140;70" dur="1.5s" repeatCount="indefinite"/>
                <animate attributeName="stroke-dashoffset" values="0;-70;0" dur="1.5s" repeatCount="indefinite"/>
              </circle>
            </svg>
          </div>
          <span id="btnText">Iniciar Sesión</span>
        </button>
      </form>

      <div class="form-footer">
        <p class="footer-text">¿No tienes cuenta? <a href="#">Contáctanos</a></p>
        <p class="version">v2.0.0 — Las Gambusinas © 2026</p>
      </div>
    </div>
  </div>

  <script src="/dashboard/assets/js/login.js"></script>
  <script>
    // Image Slider Animation
    (function() {
      const images = document.querySelectorAll('.slider-image');
      let currentIndex = 0;
      const interval = 5000; // 5 seconds between transitions
      
      function nextImage() {
        // Remove active class from current image
        images[currentIndex].classList.remove('active');
        
        // Move to next image (loop back to start)
        currentIndex = (currentIndex + 1) % images.length;
        
        // Add active class to new image
        images[currentIndex].classList.add('active');
      }
      
      // Start the slider
      if (images.length > 1) {
        setInterval(nextImage, interval);
      }
    })();
  </script>
</body>
</html>
